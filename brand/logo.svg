<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Shield -->
  <path d="M256 60 L430 150 L430 280 C430 380 350 440 256 480 C162 440 82 380 82 280 L82 150 Z"
        fill="none" stroke="#818CF8" stroke-width="6"/>

  <!-- Scales -->
  <!-- Beam -->
  <line x1="256" y1="145" x2="256" y2="245" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <!-- Horizontal bar -->
  <line x1="185" y1="245" x2="327" y2="245" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <!-- Left chain -->
  <line x1="185" y1="245" x2="155" y2="190" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="327" y1="245" x2="357" y2="190" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M125 180 Q155 158 185 180" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  <path d="M130 180 L180 180" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <!-- Right pan -->
  <path d="M327 180 Q357 158 387 180" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  <path d="M332 180 L382 180" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="256" cy="245" r="7" fill="url(#gold)"/>
</svg>
