<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Shield outline - thick, clear -->
  <path d="M256 80 L410 160 L410 290 C410 380 330 430 256 460 C182 430 102 380 102 290 L102 160 Z"
        fill="none" stroke="#818CF8" stroke-width="10" stroke-linejoin="round"/>

  <!-- Scales of justice - simplified -->
  <!-- Vertical beam -->
  <line x1="256" y1="155" x2="256" y2="260" stroke="#F59E0B" stroke-width="8" stroke-linecap="round"/>
  <!-- Horizontal bar -->
  <line x1="190" y1="260" x2="322" y2="260" stroke="#F59E0B" stroke-width="8" stroke-linecap="round"/>
  <!-- Left triangle bracket -->
  <path d="M155 205 L190 260 L190 195 Z" fill="none" stroke="#F59E0B" stroke-width="6" stroke-linejoin="round"/>
  <!-- Right triangle bracket -->
  <path d="M357 205 L322 260 L322 195 Z" fill="none" stroke="#F59E0B" stroke-width="6" stroke-linejoin="round"/>
  <!-- Left pan -->
  <line x1="140" y1="195" x2="200" y2="195" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  <!-- Right pan -->
  <line x1="312" y1="195" x2="372" y2="195" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="260" r="10" fill="#F59E0B"/>
</svg>
