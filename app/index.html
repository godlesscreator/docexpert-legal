<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>DocExpert AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f13;color:#e4e4e8;overflow-x:hidden}
.container{max-width:420px;margin:0 auto;padding:0 16px}
.header{background:linear-gradient(135deg,#1E1B4B 0%,#16213e 100%);padding:32px 0 24px;text-align:center;border-bottom:1px solid #2a2a3e}
.logo{margin-bottom:12px}
.logo img{width:72px;height:72px;border-radius:16px;box-shadow:0 0 20px rgba(99,102,241,0.3)}
.title{font-size:22px;font-weight:700;background:linear-gradient(135deg,#818CF8,#6366F1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:13px;color:#71717a;margin-top:6px}
.features{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:20px 0}
.card{background:#1a1a28;border:1px solid #2a2a3e;border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;transition:all .2s}
.card:hover,.card:active{background:#222239;border-color:#818CF8}
.card .icon{font-size:28px;margin-bottom:8px}
.card .label{font-size:13px;color:#a1a1aa;font-weight:500}
.upload-zone{border:2px dashed #2a2a3e;border-radius:16px;padding:32px 16px;text-align:center;margin:16px 0;cursor:pointer;transition:all .2s;background:#1a1a28}
.upload-zone:hover,.upload-zone.drag{border-color:#818CF8}
.upload-zone .icon{font-size:40px;margin-bottom:10px}
.upload-zone .text{font-size:14px;color:#a1a1aa}
.upload-zone .hint{font-size:12px;color:#52525b;margin-top:6px}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;text-decoration:none;text-align:center;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#6366F1,#2563eb);color:#fff;margin-bottom:10px}
.btn-primary:active{opacity:.9}
.btn-secondary{background:#1a1a28;color:#818CF8;border:1px solid #2a2a3e}
.btn-secondary:active{border-color:#818CF8}
.status{display:none;padding:16px;border-radius:12px;margin:16px 0;text-align:center;font-size:14px}
.status.preview{background:#1a1a28;border:1px solid #2a2a3e;color:#6366F1}
.status.error{background:#1a1a28;border:1px solid #2a2a3e;color:#f87171}
.info-panel{display:none;background:#1a1a28;border:1px solid #2a2a3e;border-radius:14px;padding:20px;margin:16px 0;animation:fadeIn .3s}
.info-panel.show{display:block}
.info-panel h3{font-size:16px;margin-bottom:12px;color:#818CF8}
.info-panel p{font-size:13px;color:#a1a1aa;line-height:1.6;margin-bottom:6px}
.info-panel .close{float:right;background:none;border:none;color:#71717a;font-size:18px;cursor:pointer}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.footer{text-align:center;padding:24px 0;font-size:11px;color:#52525b;border-top:1px solid #2a2a3e;margin-top:32px}
.footer a{color:#818CF8;text-decoration:none}
.tabs{display:flex;gap:4px;background:#1a1a28;border-radius:12px;padding:4px;margin-top:20px}
.tab{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:500;text-align:center;cursor:pointer;border:none;background:transparent;color:#71717a;transition:all .2s}
.tab.active{background:#2a2a3e;color:#e4e4e8}
.hidden{display:none!important}
.history-list .empty{text-align:center;padding:32px;color:#52525b;font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><img src="assets/logo.png" alt="DocExpert AI"></div>
  <div class="title">DocExpert AI</div>
  <div class="subtitle">ИИ-анализ договоров и документов</div>
</div>

<div class="container">

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="switchTab('analyze')">📋 Анализ</button>
    <button class="tab" onclick="switchTab('history')">📂 История</button>
  </div>

  <div id="tab-analyze">
    <div class="features" id="featuresGrid">
      <div class="card" id="card-risks"><div class="icon">🔍</div><div class="label">Поиск рисков</div></div>
      <div class="card" id="card-report"><div class="icon">📊</div><div class="label">Отчёт за секунды</div></div>
      <div class="card" id="card-laws"><div class="icon">📜</div><div class="label">Статьи законов</div></div>
      <div class="card" id="card-ai"><div class="icon">🤖</div><div class="label">YandexGPT</div></div>
    </div>

    <div class="info-panel" id="featureInfo">
      <button class="close" onclick="document.getElementById('featureInfo').classList.remove('show')">✕</button>
      <h3 id="featureTitle"></h3>
      <div id="featureContent"></div>
    </div>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📎</div>
      <div class="text">Нажмите или перетащите файл</div>
      <div class="hint">PDF, DOCX до 20 МБ</div>
    </div>
    <input type="file" id="fileInput" accept=".pdf,.docx" style="display:none" onchange="handleFile(this)">

    <div class="status preview" id="statusPreview"></div>
    <div class="status error" id="statusError"></div>

    <a href="https://t.me/DocHelper2026_bot" target="_blank" class="btn btn-primary" id="openTgBtn">🚀 Открыть в Telegram</a>
    <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📎 Загрузить документ</button>
  </div>

  <div id="tab-history" class="hidden">
    <div class="history-list" id="historyList">
      <div class="empty">Нет сохранённых анализов</div>
    </div>
  </div>

  <div class="footer">
    <a href="../privacy-policy">Политика конфиденциальности</a> &nbsp;·&nbsp;
    <a href="../terms-of-service">Пользовательское соглашение</a>
    <br>© 2026 DocExpert AI
  </div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
(function() {
  var tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) {
    tg.ready();
    try { tg.setHeaderColor('#1a1a2e'); } catch(e) {}
    try { tg.setBackgroundColor('#0f0f13'); } catch(e) {}
  }

  // Кнопка "Открыть в Telegram"
  var openBtn = document.getElementById('openTgBtn');
  if (openBtn) {
    openBtn.addEventListener('click', function(e) {
      if (tg) {
        e.preventDefault();
        tg.openTelegramLink('https://t.me/DocHelper2026_bot');
      }
    });
  }

  // Кликабельные карточки
  var cardMap = {'card-risks':'risks','card-report':'report','card-laws':'laws','card-ai':'ai'};
  for (var cid in cardMap) {
    (function(feature) {
      var el = document.getElementById(cid);
      if (el) el.addEventListener('click', function() { window.showFeature(feature); });
    })(cardMap[cid]);
  }

  // Drag & drop
  var zone = document.getElementById('dropZone');
  if (zone) {
    zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', function() { zone.classList.remove('drag'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault(); zone.classList.remove('drag');
      if (e.dataTransfer.files[0]) {
        document.getElementById('fileInput').files = e.dataTransfer.files;
        window.handleFile(document.getElementById('fileInput'));
      }
    });
  }

  // Init history
  window.renderHistory();
})();

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('[id^="tab-"]').forEach(function(t) { t.classList.add('hidden'); });
  document.getElementById('tab-'+tab).classList.remove('hidden');
  document.querySelector('[onclick*="'+tab+'"]').classList.add('active');
}

function showFeature(id) {
  var info = {
    risks:{title:'🔍 Поиск рисков',html:'<p>DocExpert AI анализирует документ и находит:</p><p>⚠️ Завышенные штрафы и пени</p><p>⚠️ Односторонние права и скрытые комиссии</p><p>⚠️ Отсутствие сроков и размытые формулировки</p><p>⚠️ Нарушения ТК РФ, ГК РФ, 152-ФЗ</p><p style="color:#6366F1;margin-top:8px">Каждый риск — с конкретным пунктом договора и статьёй закона</p>'},
    report:{title:'📊 Отчёт за секунды',html:'<p>📋 Определение типа документа</p><p>⚡ Уровень риска: 🟢 🟡 🔴</p><p>📝 Краткое резюме простым языком</p><p>⚠️ Список проблем с приоритетом</p><p>✅ Что в порядке (только реальные плюсы)</p><p>💡 Конкретная рекомендация</p><p style="color:#6366F1;margin-top:8px">Время анализа: 15–60 секунд</p>'},
    laws:{title:'📜 Статьи законов',html:'<p>Анализ опирается на актуальное законодательство РФ (июнь 2026):</p><p>• Трудовой кодекс РФ (ТК РФ)</p><p>• Гражданский кодекс РФ (ГК РФ)</p><p>• 152-ФЗ «О персональных данных»</p><p>• Закон «О защите прав потребителей»</p><p>• КоАП РФ</p><p style="color:#a1a1aa;margin-top:8px">Для каждого риска бот указывает конкретную статью</p>'},
    ai:{title:'🤖 YandexGPT',html:'<p>Сервис работает на базе YandexGPT 32k — большой языковой модели Яндекса.</p><p>• Специализированные юридические промпты</p><p>• Двойная проверка результатов</p><p>• Сервера на территории РФ (152-ФЗ)</p><p>• Текст удаляется сразу после анализа</p><p style="color:#6366F1;margin-top:8px">6 типов промптов под разные документы</p>'}
  };
  var data = info[id];
  if (!data) return;
  document.getElementById('featureTitle').textContent = data.title;
  document.getElementById('featureContent').innerHTML = data.html;
  document.getElementById('featureInfo').classList.add('show');
}

function handleFile(input) {
  var file = input.files[0];
  if (!file) return;
  var ext = '.' + file.name.split('.').pop().toLowerCase();
  if (['.pdf','.docx','.doc'].indexOf(ext) === -1) { showError('Поддерживаются только PDF и DOCX'); return; }
  if (file.size > 20*1024*1024) { showError('Файл больше 20 МБ'); return; }

  // Без ложного спиннера — сразу показываем что делать
  document.getElementById('statusError').style.display = 'none';
  var prev = document.getElementById('statusPreview');
  prev.style.display = 'block';
  prev.innerHTML = '📄 <b>'+escapeHtml(file.name)+'</b><br><span style="color:#a1a1aa;font-size:13px">Файл загружен. Отправьте его в Telegram бота для анализа.</span>';

  saveToHistory(file.name, '⏳', new Date().toISOString());
}

function showError(msg) {
  var el = document.getElementById('statusError');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
  document.getElementById('statusPreview').style.display = 'none';
}

function saveToHistory(filename, level, date) {
  var history = [];
  try { history = JSON.parse(localStorage.getItem('docexpert_history')||'[]'); } catch(e) {}
  history.unshift({filename:filename, level:level, date:date, id:Date.now()});
  if (history.length > 20) history = history.slice(0,20);
  try { localStorage.setItem('docexpert_history', JSON.stringify(history)); } catch(e) {}
  renderHistory();
}

function renderHistory() {
  var history = [];
  try { history = JSON.parse(localStorage.getItem('docexpert_history')||'[]'); } catch(e) {}
  var el = document.getElementById('historyList');
  if (history.length === 0) { el.innerHTML = '<div class="empty">Нет сохранённых анализов</div>'; return; }
  el.innerHTML = history.map(function(h) {
    return '<div class="card" style="text-align:left;margin-bottom:8px;cursor:default">'+
      '<div style="font-weight:600;margin-bottom:4px">📄 '+escapeHtml(h.filename)+'</div>'+
      '<div style="font-size:12px;color:#71717a">'+new Date(h.date).toLocaleString('ru')+' · '+h.level+'</div>'+
      '<div style="font-size:12px;color:#52525b;margin-top:4px">Полный отчёт в @DocHelper2026_bot</div>'+
      '</div>';
  }).join('');
}

function escapeHtml(text) {
  var d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
</script>
</body>
</html>
